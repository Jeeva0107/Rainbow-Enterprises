<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <g opacity="0.95">
    <!-- Honey Jar Body -->
    <rect x="45" y="45" width="110" height="135" rx="20" fill="#E8D8A0" fill-opacity="0.25" stroke="#b08953" stroke-width="2" />
    <path d="M65 45 L135 45 L125 32 L75 32 Z" fill="#E8D8A0" fill-opacity="0.25" stroke="#b08953" stroke-width="1.5" />
    
    <!-- Metal lid -->
    <rect x="68" y="20" width="64" height="14" rx="3" fill="#B38F5C" stroke="#b08953" stroke-width="1.5" />
    
    <!-- Honey (rich amber liquid) -->
    <rect x="51" y="53" width="98" height="119" rx="15" fill="#D2691E" fill-opacity="0.85" />
    <path d="M67 53 L133 53 L125 45 L75 45 Z" fill="#D2691E" fill-opacity="0.85" />
    
    <!-- Highlight -->
    <rect x="58" y="60" width="8" height="105" rx="4" fill="#FFFFFF" fill-opacity="0.3" />
    
    <!-- Label -->
    <rect x="52" y="78" width="96" height="72" rx="3" fill="#F4EFE4" stroke="#1e3b26" stroke-width="1" />
    <text x="100" y="96" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#1e3b26" text-anchor="middle" letter-spacing="1">rootsveyr</text>
    <text x="100" y="113" font-family="sans-serif" font-size="8" font-weight="black" fill="#b08953" text-anchor="middle">Raw Mountain</text>
    <text x="100" y="125" font-family="sans-serif" font-size="9" font-weight="black" fill="#b08953" text-anchor="middle">Honey</text>
    <text x="100" y="139" font-family="sans-serif" font-size="6" font-weight="bold" fill="#1e3b26" text-anchor="middle">500G</text>
  </g>
